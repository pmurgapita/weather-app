<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
</head>
<body>
    <div class="header">
        <h1>The Weather</h1>
        <div class="inputs">
            <input type="text" id="location" placeholder="Please, select your location">
            <select name="Unit" id="unit">
                <option value="metric" selected>Celsius</option>
                <option value="us">Farenheit</option>
            </select>
        </div>
        <div class="buttons">
            <button class="submit">Current</button>
            <button class="today">Today</button>
            <button class="week">7-days</button>
        </div>
    </div>
    <div class="main">
        <h1 class="load" hidden="true">LOADING...</h1>
        <div class="headWeather"></div>
        <div class="data">
            <div class="mainData"></div>
            <div class="sideData"></div>
        </div>
        <div class="hours"></div>
    </div>
</body>
</html>
